server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API and WebSocket requests → gateway
    location /api/ {
        proxy_pass http://gateway:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://gateway:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # OTLP trace export → OTel Collector HTTP receiver
    location /otlp/ {
        proxy_pass http://otel-collector:4318/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Faro browser telemetry → Alloy faro.receiver
    location /faro/ {
        proxy_pass http://alloy:12347/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
