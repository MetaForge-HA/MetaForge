version: "3.8"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      - tempo
      - loki
    networks:
      - metaforge-obs

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - metaforge-obs

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"  # Use 3001 to avoid conflict with dashboard dev server
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=metaforge
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - metaforge-obs

  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API
      - "14317:4317"  # OTLP gRPC (internal, mapped to 14317 on host to avoid collision)
    networks:
      - metaforge-obs

  loki:
    image: grafana/loki:latest
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - metaforge-obs

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - /etc/alloy/alloy-config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./observability/alloy-config.alloy:/etc/alloy/alloy-config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy
    ports:
      - "12347:12347"  # Faro browser SDK receiver
    depends_on:
      - loki
    networks:
      - metaforge-obs
      - metaforge

  alertmanager:
    image: prom/alertmanager:latest
    command: ["--config.file=/etc/alertmanager/alertmanager.yaml"]
    volumes:
      - ./observability/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - metaforge-obs

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
  alertmanager-data:
  alloy-data:

networks:
  metaforge-obs:
    driver: bridge
  metaforge:
    external: true
    name: metaforge_metaforge
