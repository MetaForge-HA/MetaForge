<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetaForge Chat</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Base reset & VS Code dark-theme palette                            */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d2d;
      --bg-input: #3c3c3c;
      --text-primary: #cccccc;
      --text-secondary: #9d9d9d;
      --text-muted: #6a6a6a;
      --border-color: #3c3c3c;
      --accent: #0078d4;
      --accent-hover: #1a8ceb;
      --user-bubble: #264f78;
      --agent-bubble: #2d2d2d;
      --system-bubble: #252526;
      --success: #4ec9b0;
      --scrollbar-thumb: #424242;
      --scrollbar-track: transparent;
    }

    body {
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--text-primary);
      background: var(--bg-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Scrollbar                                                          */
    /* ------------------------------------------------------------------ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ------------------------------------------------------------------ */
    /* Layout                                                             */
    /* ------------------------------------------------------------------ */
    #chat-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-secondary);
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    #chat-header .scope-label {
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 8px;
    }

    #message-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
    }

    /* ------------------------------------------------------------------ */
    /* Message bubbles                                                    */
    /* ------------------------------------------------------------------ */
    .message {
      display: flex;
      padding: 4px 12px;
      gap: 8px;
      align-items: flex-start;
    }
    .message.user { flex-direction: row-reverse; }
    .message.system { justify-content: center; }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }
    .avatar.user-avatar { background: #0078d4; }
    .avatar.agent-avatar { background: #16825d; }

    .bubble {
      max-width: 80%;
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }
    .message.agent .bubble {
      background: var(--agent-bubble);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
    }
    .message.system .bubble {
      background: var(--system-bubble);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-style: italic;
      font-size: 11px;
      max-width: 90%;
      text-align: center;
    }

    .sender-name {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .message.user .sender-name { text-align: right; }

    .timestamp {
      font-size: 9px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .message.user .timestamp { text-align: right; }

    /* ------------------------------------------------------------------ */
    /* Typing indicator                                                   */
    /* ------------------------------------------------------------------ */
    #typing-indicator {
      display: none;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-muted);
      align-items: center;
      gap: 6px;
    }
    #typing-indicator.visible { display: flex; }

    .typing-dots {
      display: inline-flex;
      gap: 2px;
    }
    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-4px); }
    }

    /* ------------------------------------------------------------------ */
    /* Composer                                                           */
    /* ------------------------------------------------------------------ */
    #composer {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 8px 12px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    #composer textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-primary);
      padding: 6px 10px;
      font-family: inherit;
      font-size: 12px;
      line-height: 1.4;
      outline: none;
      min-height: 32px;
      max-height: 100px;
      overflow-y: auto;
    }
    #composer textarea:focus {
      border-color: var(--accent);
    }
    #composer textarea::placeholder {
      color: var(--text-muted);
    }

    #send-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 14px; height: 14px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="chat-header">
    MetaForge Chat
    <span class="scope-label" id="scope-label"></span>
  </div>

  <!-- Messages -->
  <div id="message-list">
    <div class="empty-state" id="empty-state">
      No messages yet. Start the conversation.
    </div>
  </div>

  <!-- Typing indicator -->
  <div id="typing-indicator">
    <span class="typing-dots"><span></span><span></span><span></span></span>
    <span id="typing-agent-name">Agent</span> is typing...
  </div>

  <!-- Composer -->
  <div id="composer">
    <textarea id="message-input" rows="1" placeholder="Type a message..."></textarea>
    <button id="send-btn" disabled aria-label="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="m5 12 7-7 7 7"/>
        <path d="M12 19V5"/>
      </svg>
    </button>
  </div>

  <script>
    // -------------------------------------------------------------------- //
    // VS Code API bridge                                                   //
    // -------------------------------------------------------------------- //
    // eslint-disable-next-line no-undef
    const vscode = acquireVsCodeApi();

    // -------------------------------------------------------------------- //
    // DOM refs                                                             //
    // -------------------------------------------------------------------- //
    const messageList = document.getElementById('message-list');
    const emptyState = document.getElementById('empty-state');
    const typingIndicator = document.getElementById('typing-indicator');
    const typingAgentName = document.getElementById('typing-agent-name');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const scopeLabel = document.getElementById('scope-label');

    let messageCount = 0;

    // -------------------------------------------------------------------- //
    // Helpers                                                              //
    // -------------------------------------------------------------------- //

    function formatTime(isoString) {
      try {
        const d = new Date(isoString);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch {
        return '';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /** Render a single message and append it to the list. */
    function appendMessage(msg) {
      // Hide empty state once we have messages.
      if (emptyState) emptyState.style.display = 'none';

      const kind = msg.actor?.kind || 'system';
      const displayName = msg.actor?.displayName || 'System';

      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + kind;

      if (kind === 'system') {
        wrapper.innerHTML =
          '<div class="bubble">' + escapeHtml(msg.content) + '</div>';
      } else {
        const avatarClass = kind === 'user' ? 'user-avatar' : 'agent-avatar';
        const initial = kind === 'user'
          ? displayName.charAt(0).toUpperCase()
          : (msg.actor?.agentCode || displayName.slice(0, 2).toUpperCase());

        wrapper.innerHTML =
          '<div class="avatar ' + avatarClass + '">' + escapeHtml(initial) + '</div>' +
          '<div>' +
            '<div class="sender-name">' + escapeHtml(displayName) + '</div>' +
            '<div class="bubble">' + escapeHtml(msg.content) + '</div>' +
            '<div class="timestamp">' + formatTime(msg.createdAt) + '</div>' +
          '</div>';
      }

      messageList.appendChild(wrapper);
      messageList.scrollTop = messageList.scrollHeight;
      messageCount++;
    }

    /** Update the send button's disabled state based on input content. */
    function updateSendBtn() {
      sendBtn.disabled = messageInput.value.trim().length === 0;
    }

    /** Auto-grow the textarea up to a max height. */
    function autoGrow() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
    }

    /** Send the current input as a message. */
    function sendMessage() {
      const content = messageInput.value.trim();
      if (!content) return;

      // Optimistically render the user message locally.
      appendMessage({
        id: 'local-' + Date.now(),
        actor: { kind: 'user', displayName: 'You' },
        content: content,
        createdAt: new Date().toISOString(),
      });

      // Post to extension host.
      vscode.postMessage({ type: 'sendMessage', content: content });

      // Reset composer.
      messageInput.value = '';
      messageInput.style.height = 'auto';
      updateSendBtn();
      messageInput.focus();
    }

    // -------------------------------------------------------------------- //
    // Event listeners                                                      //
    // -------------------------------------------------------------------- //

    messageInput.addEventListener('input', function() {
      updateSendBtn();
      autoGrow();
    });

    messageInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // -------------------------------------------------------------------- //
    // Receive messages from the extension host                             //
    // -------------------------------------------------------------------- //

    window.addEventListener('message', function(event) {
      const msg = event.data;
      if (!msg || !msg.type) return;

      switch (msg.type) {
        case 'receiveMessage':
          appendMessage(msg.message);
          break;

        case 'updateThread':
          // Clear current messages and render the full thread.
          messageList.innerHTML = '';
          messageCount = 0;
          if (msg.thread && msg.thread.messages) {
            msg.thread.messages.forEach(function(m) { appendMessage(m); });
          }
          if (messageCount === 0 && emptyState) {
            emptyState.style.display = 'flex';
            messageList.appendChild(emptyState);
          }
          break;

        case 'setContext':
          if (msg.scope && msg.scope.label) {
            scopeLabel.textContent = '(' + msg.scope.label + ')';
          } else {
            scopeLabel.textContent = '';
          }
          break;

        case 'typing':
          if (msg.isTyping) {
            typingAgentName.textContent = msg.agentName || 'Agent';
            typingIndicator.classList.add('visible');
          } else {
            typingIndicator.classList.remove('visible');
          }
          messageList.scrollTop = messageList.scrollHeight;
          break;
      }
    });
  </script>
</body>
</html>
