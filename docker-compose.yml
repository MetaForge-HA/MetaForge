# MetaForge — Full-stack local development environment
#
# Usage:
#   docker compose up                           # Core platform
#   docker compose up --profile observability   # + Grafana/Prometheus/Tempo/Loki
#   docker compose down -v                      # Teardown + remove volumes
#
# Services available after startup:
#   Dashboard:    http://localhost:3000
#   Gateway:      http://localhost:8000/health
#   Neo4j:        http://localhost:7474  (bolt://localhost:7687)
#   Temporal UI:  http://localhost:8080
#   Kafka:        localhost:9092
#   Grafana:      http://localhost:3001  (profile: observability)

services:
  # ── MetaForge Gateway ────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - METAFORGE_ENV=docker
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-metaforge}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TEMPORAL_HOST=temporal:7233
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OCCT_CONVERTER_URL=http://occt-converter:8100
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-metaforge}:${POSTGRES_PASSWORD:-metaforge}@postgres:5432/${POSTGRES_DB:-metaforge}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal:
        condition: service_healthy
      occt-converter:
        condition: service_healthy
    networks:
      - metaforge
    restart: unless-stopped

  # ── OCCT Converter (STEP/IGES → GLB microservice) ──────────────
  occt-converter:
    build:
      context: ./tools/occt-converter
      dockerfile: Dockerfile
    image: metaforge-occt:latest
    ports:
      - "${OCCT_PORT:-8100}:8100"
    healthcheck:
      test: ["CMD", "/opt/conda/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - metaforge
    restart: unless-stopped

  # ── MetaForge Dashboard (production — static nginx build) ────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    profiles: ["prod"]
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - metaforge
    restart: unless-stopped

  # ── MetaForge Dashboard (dev — Vite HMR, no rebuild needed) ────
  dashboard-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ./dashboard:/app
      - dashboard-node-modules:/app/node_modules
    environment:
      - VITE_API_URL=http://gateway:8000
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - metaforge
    restart: unless-stopped

  # ── PostgreSQL (Gateway persistence — chat, sessions, projects) ──
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metaforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metaforge}
      POSTGRES_DB: ${POSTGRES_DB:-metaforge}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metaforge}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - metaforge
    restart: unless-stopped

  # ── Neo4j (Digital Twin graph database) ──────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-metaforge}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - metaforge
    restart: unless-stopped

  # ── Kafka (Event Bus) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - metaforge
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - metaforge
    restart: unless-stopped

  # ── PostgreSQL (Temporal persistence) ────────────────────────────
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - metaforge
    restart: unless-stopped

  # ── Temporal (Workflow Engine) ──────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - metaforge
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.26.2
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - metaforge
    restart: unless-stopped

  # ── KiCad Adapter (Phase 1 — read-only ERC/DRC/BOM/Gerber) ──────
  kicad-adapter:
    build:
      context: .
      dockerfile: tool_registry/tools/kicad/Dockerfile
    image: metaforge/kicad-adapter:latest
    stdin_open: true
    volumes:
      - adapter-workspace:/workspace
    environment:
      - METAFORGE_ENV=docker
      - KICAD_WORK_DIR=/workspace
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    healthcheck:
      test: ["CMD", "kicad-cli", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - metaforge
    restart: unless-stopped

  # ── CalculiX Adapter (FEA stress/displacement analysis) ─────────
  calculix-adapter:
    build:
      context: .
      dockerfile: tool_registry/tools/calculix/Dockerfile
    image: metaforge/calculix-adapter:latest
    ports:
      - "${CALCULIX_PORT:-8200}:8200"
    volumes:
      - adapter-workspace:/workspace
    environment:
      - METAFORGE_ENV=docker
      - CALCULIX_WORK_DIR=/workspace
      - CCX_BINARY=ccx
      - MCP_PORT=8200
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - metaforge
    restart: unless-stopped

  # ── CadQuery Adapter (Pythonic CAD generation, scripting) ───────
  cadquery-adapter:
    build:
      context: .
      dockerfile: tool_registry/tools/cadquery/Dockerfile
    image: metaforge/cadquery-adapter:latest
    stdin_open: true
    volumes:
      - adapter-workspace:/workspace
    environment:
      - METAFORGE_ENV=docker
      - CADQUERY_WORK_DIR=/workspace
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
    healthcheck:
      test: ["CMD", "python3", "-c", "import cadquery; print(cadquery.__version__)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - metaforge
    restart: unless-stopped

  # ── FreeCAD Adapter (CAD export, meshing, boolean ops) ──────────
  freecad-adapter:
    build:
      context: .
      dockerfile: tool_registry/tools/freecad/Dockerfile
    image: metaforge/freecad-adapter:latest
    stdin_open: true
    volumes:
      - adapter-workspace:/workspace
    environment:
      - METAFORGE_ENV=docker
      - FREECAD_WORK_DIR=/workspace
      - QT_QPA_PLATFORM=offscreen
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4'
    healthcheck:
      test: ["CMD", "freecadcmd", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - metaforge
    restart: unless-stopped

  # ── Observability (opt-in via --profile) ─────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - tempo
      - loki
    networks:
      - metaforge
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - metaforge
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    volumes:
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./observability/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-metaforge}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
      - tempo
      - loki
    networks:
      - metaforge
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.7.0
    profiles: ["observability"]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - metaforge
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./observability/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - metaforge
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    profiles: ["observability"]
    command: ["--config.file=/etc/alertmanager/alertmanager.yaml"]
    volumes:
      - ./observability/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - metaforge
    restart: unless-stopped

volumes:
  dashboard-node-modules:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  zookeeper-data:
  kafka-data:
  temporal-db-data:
  adapter-workspace:
  prometheus-data:
  grafana-data:
  tempo-data:
  loki-data:
  alertmanager-data:

networks:
  metaforge:
    driver: bridge
