groups:
  - name: metaforge_critical
    rules:
      - alert: GatewayDown
        expr: up{job="metaforge-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MetaForge Gateway is down"
          description: "Gateway has been unreachable for more than 1 minute."
          runbook_url: "https://docs.metaforge.dev/runbooks/gateway-down"

      - alert: KafkaConsumerStopped
        expr: rate(metaforge_kafka_messages_consumed_total[5m]) == 0 and metaforge_kafka_consumer_lag > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kafka consumer {{ $labels.consumer_group }} has stopped"
          description: "Consumer group {{ $labels.consumer_group }} has zero consumption rate but non-zero lag."

      - alert: Neo4jUnreachable
        expr: metaforge_neo4j_active_connections == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Neo4j is unreachable"
          description: "No active Neo4j connections for more than 1 minute."

  - name: metaforge_warning
    rules:
      - alert: HighAgentFailureRate
        expr: rate(metaforge_agent_execution_total{status="error"}[10m]) / rate(metaforge_agent_execution_total[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High agent failure rate for {{ $labels.agent_code }}"
          description: "Agent {{ $labels.agent_code }} has >10% failure rate over 10 minutes."

      - alert: KafkaConsumerLagHigh
        expr: metaforge_kafka_consumer_lag > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumer_group }} topic {{ $labels.topic }} has lag > 5000."

      - alert: ErrorBudgetBurnRate
        expr: |
          (
            1 - (
              sum(rate(metaforge_gateway_request_total{status_code!~"5.."}[1h]))
              /
              sum(rate(metaforge_gateway_request_total[1h]))
            )
          ) * 720 > 14.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Error budget burn rate is too high"
          description: "Gateway error budget is being consumed at 14.4x the sustainable rate."

      - alert: LLMCostSpike
        expr: sum(rate(metaforge_agent_llm_cost_usd_total[1h])) * 3600 > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "LLM cost spike detected"
          description: "Projected hourly LLM cost exceeds $10."

      - alert: OscillationDetected
        expr: rate(metaforge_oscillation_detected_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Design oscillation detected"
          description: "Agent feedback loop detected for {{ $labels.node_type }}."

  - name: metaforge_anomaly
    rules:
      - alert: DeviceTelemetryStopped
        expr: absent_over_time(metaforge_mqtt_messages_received_total{device_id=~".+"}[5m])
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Device telemetry has stopped"
          description: "No MQTT messages received from any device in the last 5 minutes."
          runbook_url: "https://docs.metaforge.dev/runbooks/device-telemetry-stopped"

      - alert: SensorOutOfRange
        expr: metaforge_telemetry_lag_seconds > 300
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Sensor out of range for device {{ $labels.device_id }}"
          description: "Device {{ $labels.device_id }} telemetry lag exceeds safe threshold (>300s)."

      - alert: DeviceOffline
        expr: changes(metaforge_mqtt_messages_received_total[2m]) == 0 and metaforge_mqtt_messages_received_total > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Device {{ $labels.device_id }} appears offline"
          description: "Device {{ $labels.device_id }} stopped sending MQTT messages without graceful shutdown."

      - alert: FleetAnomalyPattern
        expr: (sum(rate(metaforge_telemetry_ingestion_total{status="error"}[5m])) / sum(rate(metaforge_telemetry_ingestion_total[5m]))) > 0.10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Fleet-wide anomaly pattern detected"
          description: "More than 10% of fleet devices are reporting errors simultaneously."
          runbook_url: "https://docs.metaforge.dev/runbooks/fleet-anomaly-pattern"

      - alert: TSDBIngestionFailing
        expr: (sum(rate(metaforge_telemetry_ingestion_errors_total[5m])) / sum(rate(metaforge_telemetry_ingestion_total[5m]))) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "TSDB ingestion failure rate is elevated"
          description: "Telemetry write error rate exceeds 1% over the last 5 minutes."
