groups:
  - name: metaforge_critical
    rules:
      - alert: GatewayDown
        expr: up{job="metaforge-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MetaForge Gateway is down"
          description: "Gateway has been unreachable for more than 1 minute."
          runbook_url: "https://docs.metaforge.dev/runbooks/gateway-down"

      - alert: KafkaConsumerStopped
        expr: rate(metaforge_kafka_messages_consumed_total[5m]) == 0 and metaforge_kafka_consumer_lag > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kafka consumer {{ $labels.consumer_group }} has stopped"
          description: "Consumer group {{ $labels.consumer_group }} has zero consumption rate but non-zero lag."

      - alert: Neo4jUnreachable
        expr: metaforge_neo4j_active_connections == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Neo4j is unreachable"
          description: "No active Neo4j connections for more than 1 minute."

  - name: metaforge_warning
    rules:
      - alert: HighAgentFailureRate
        expr: rate(metaforge_agent_execution_total{status="error"}[10m]) / rate(metaforge_agent_execution_total[10m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High agent failure rate for {{ $labels.agent_code }}"
          description: "Agent {{ $labels.agent_code }} has >10% failure rate over 10 minutes."

      - alert: KafkaConsumerLagHigh
        expr: metaforge_kafka_consumer_lag > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.consumer_group }} topic {{ $labels.topic }} has lag > 5000."

      - alert: ErrorBudgetBurnRate
        expr: |
          (
            1 - (
              sum(rate(metaforge_gateway_request_total{status_code!~"5.."}[1h]))
              /
              sum(rate(metaforge_gateway_request_total[1h]))
            )
          ) * 720 > 14.4
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Error budget burn rate is too high"
          description: "Gateway error budget is being consumed at 14.4x the sustainable rate."

      - alert: LLMCostSpike
        expr: sum(rate(metaforge_agent_llm_cost_usd_total[1h])) * 3600 > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "LLM cost spike detected"
          description: "Projected hourly LLM cost exceeds $10."

      - alert: OscillationDetected
        expr: rate(metaforge_oscillation_detected_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Design oscillation detected"
          description: "Agent feedback loop detected for {{ $labels.node_type }}."

  - name: metaforge_fleet_alerts
    rules:
      # Device has not sent telemetry for > N minutes (configurable per device type).
      # The threshold is set per device_type label on the metric; default 5m window.
      - alert: DeviceTelemetryStopped
        expr: |
          (time() - metaforge_device_last_telemetry_timestamp) > on(device_type)
          group_left metaforge_device_type_telemetry_interval_seconds * 3
          or
          (time() - metaforge_device_last_telemetry_timestamp) > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Device {{ $labels.device_id }} telemetry stopped"
          description: >-
            Device {{ $labels.device_id }} (type: {{ $labels.device_type }}) has not sent
            telemetry for more than 3x its expected reporting interval. Last seen
            {{ $value | humanizeDuration }} ago.
          runbook_url: "observability/runbooks/device-telemetry-stopped.md"

      # Sensor value exceeds defined safe operating range (min/max thresholds).
      - alert: SensorOutOfRange
        expr: |
          metaforge_sensor_value > on(device_type, sensor_name)
          group_left metaforge_sensor_threshold_max
          or
          metaforge_sensor_value < on(device_type, sensor_name)
          group_left metaforge_sensor_threshold_min
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Sensor {{ $labels.sensor_name }} out of range on device {{ $labels.device_id }}"
          description: >-
            Sensor {{ $labels.sensor_name }} on device {{ $labels.device_id }}
            (type: {{ $labels.device_type }}) reported value {{ $value }} which is
            outside the safe operating range.
          runbook_url: "observability/runbooks/sensor-out-of-range.md"

      # Device connection lost (MQTT disconnect without graceful shutdown).
      - alert: DeviceOffline
        expr: |
          metaforge_device_connection_status == 0
          and
          metaforge_device_graceful_disconnect == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Device {{ $labels.device_id }} offline (ungraceful disconnect)"
          description: >-
            Device {{ $labels.device_id }} (type: {{ $labels.device_type }}) lost MQTT
            connection without a graceful shutdown. The device has been offline for more
            than 2 minutes.
          runbook_url: "observability/runbooks/device-offline.md"

      # Unusual number of devices reporting errors simultaneously.
      - alert: FleetAnomalyPattern
        expr: |
          count(
            rate(metaforge_device_error_total[5m]) > 0
          ) > on() (count(metaforge_device_connection_status) * 0.10)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Fleet-wide anomaly: {{ $value }} devices reporting errors simultaneously"
          description: >-
            More than 10% of the fleet ({{ $value }} devices) are reporting errors
            simultaneously over the last 5 minutes. This may indicate a systemic issue
            such as a firmware bug, infrastructure failure, or environmental event.
          runbook_url: "observability/runbooks/fleet-anomaly-pattern.md"

      # Telemetry write errors exceeding threshold — TSDB ingestion failing.
      - alert: TSDBIngestionFailing
        expr: |
          (
            sum(rate(metaforge_tsdb_write_errors_total[5m]))
            /
            clamp_min(sum(rate(metaforge_tsdb_write_requests_total[5m])), 1)
          ) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "TSDB ingestion failure rate is {{ $value | humanizePercentage }}"
          description: >-
            Telemetry write error rate to the time-series database exceeds 1% over the
            last 5 minutes. Current rate: {{ $value | humanizePercentage }}. Device
            telemetry data may be lost.
          runbook_url: "observability/runbooks/tsdb-ingestion-failing.md"
