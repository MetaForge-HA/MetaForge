global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Gateway metrics flow: Gateway → OTLP → OTel Collector → Prometheus exporter on :8889
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
